# Experiment Batch: Router Temperature Sweep
# Date: 2024-03-18
# Hypothesis: Lower temperature = harder routing = better specialization

experiments:
    exp01_baseline_dense:
        name: "Baseline Dense"
        description: "Reference point - standard dense neural receiver"
        params:
            model_family: static_dense
            training_max_steps: 10000
        expected:
            ber: ~0.0015
            compute: 100%
            note: "High compute, baseline accuracy"

    exp02_moe_default:
        name: "MoE Default"
        description: "MoE with balanced temperature=1.0"
        params:
            model_family: moe
            model_router_temperature: 1.0
            model_compute_flops_penalty_alpha: 0.0001
            training_max_steps: 10000
        expected:
            ber: ~0.0015
            compute: ~60%
            note: "Similar accuracy, compute reduction"

    exp03_moe_hard_routing:
        name: "MoE Hard Routing"
        description: "Sharp routing with temperature=0.3"
        params:
            model_family: moe
            model_router_temperature: 0.3
            model_compute_flops_penalty_alpha: 0.0001
            training_max_steps: 10000
        expected:
            ber: ~0.0013
            compute: ~55%
            note: "Cleaner expert specialization"

    exp04_moe_soft_routing:
        name: "MoE Soft Routing"
        description: "Soft routing with temperature=2.0"
        params:
            model_family: moe
            model_router_temperature: 2.0
            model_compute_flops_penalty_alpha: 0.0001
            training_max_steps: 10000
        expected:
            ber: ~0.0017
            compute: ~65%
            note: "More flexible but potentially mixed experts"

    exp05_moe_high_penalty:
        name: "MoE High Penalty"
        description: "Aggressive compute penalty=0.001"
        params:
            model_family: moe
            model_router_temperature: 1.0
            model_compute_flops_penalty_alpha: 0.001
            training_max_steps: 10000
        expected:
            ber: ~0.0018
            compute: ~40%
            note: "Forces tiny/medium experts, significant savings"
