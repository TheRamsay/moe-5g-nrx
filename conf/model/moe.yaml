name: compute_aware_moe_nrx
family: moe

router:
    type: channel_aware
    training_gate: gumbel_softmax
    inference_gate: top1
    temperature: 1.0

experts:
    tiny:
        hidden_dim: 64
        depth: 2
    medium:
        hidden_dim: 128
        depth: 4
    heavy:
        hidden_dim: 256
        depth: 8

compute:
    routing: sparse
    active_experts: 1
    flops_penalty_alpha: 0.0001
