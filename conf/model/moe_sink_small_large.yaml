name: compute_aware_moe_nrx
family: moe

# Three-expert MoE — sink + small (full decoder) + large (full decoder).
# Synthesis of two findings:
#   1. Per-expert success rate showed nano/small never decode (0%) — pure compute optimizers.
#   2. exp61 v2 (sink + channel_only + large) matched BLER but LOST FLOPs efficiency
#      because channel_only couldn't fill the middle compute-tier role that small does.
# Conclusion: the router needs MIDDLE-TIER DECODE attempts (gradient signal), not just
# any cheap fallback. Replace nano (320M, 0% decode) with sink (0M, no compute waste);
# keep small as the productive middle tier.

shared_stem:
    state_dim: 56
    stem_hidden_dims: [64, 64]
    activation: relu
    pilot_symbol_indices: [2, 11]
    pilot_subcarrier_spacing: 2

backbone:
    pilot_symbol_indices: ${model.shared_stem.pilot_symbol_indices}
    pilot_subcarrier_spacing: ${model.shared_stem.pilot_subcarrier_spacing}

router:
    type: channel_aware
    hidden_dim: 64
    training_gate: gumbel_softmax
    inference_gate: top1
    temperature: 1.0
    min_temperature: 0.5
    use_input_statistics: false

experts:
    sink:
        type: sink
    small:
        type: decoder
        num_cnn_blocks: 8
        block_hidden_dim: 32
        readout_hidden_dim: 96
    large:
        type: decoder
        num_cnn_blocks: 8
        block_hidden_dim: 64
        readout_hidden_dim: 128

compute:
    routing: sparse
    active_experts: 1
    flops_penalty_alpha: 0.0
    load_balance_beta: 0.0
    flops_normalizer: 1.0
    channel_loss_weight: 0.05
