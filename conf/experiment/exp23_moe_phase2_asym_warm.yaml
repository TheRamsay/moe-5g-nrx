# @package _global_
# Experiment 23: MoE Phase 2 — asymmetric warm-start
#
# Phase 2 v1 (exp17, beta=0.1) showed full router collapse: the warm-started
# large expert dominated from step 1 because it was strictly better than
# nano/small on every sample. Beta sweep / capacity / switch-aux are all
# "regularize around" interventions. This run attacks the root cause: remove
# large's head-start entirely. Stem + nano + small are warm-started; large
# starts from random init.
#
# Training is a single joint phase (freeze_experts=false). Freezing would keep
# random-large from training during the frozen phase, giving the router 2k
# steps to build an aversion to large — the opposite collapse we want to avoid.
#
# Hypotheses and outcomes:
#   - Router routes heterogeneously → warm-start bias was the whole problem.
#   - Router collapses to nano/small → symmetric failure mode; init quality
#     determines which expert wins, problem is deeper than warm-start bias.
#   - Router rediscovers large once it catches up → clean recovery dynamics.
#
# beta=0.1 matches exp17 Phase 2 v1 for a clean one-variable A/B comparison.

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: moe-phase2-asym-warm-v1
  exp_name: moe_phase2_asym_nlwarm_s67
  tags: [moe, phase2, warm-start, asymmetric, hf, simo-1x4, 16qam, nl-range, asymmetric-warmstart]
  notes: >
    Asymmetric warm-start: stem + nano + small are warm-started; large starts
    random. Single joint phase (no freeze). Tests whether Phase 2 router
    collapse is caused by warm-started large being strictly dominant, or by a
    deeper failure mode independent of initialization quality.
  study_slug: 2026-04-11-moe-phase2-asym-warm-v1
  study_path: experiments/2026-04-11-moe-phase2-asym-warm-v1
  question: Does removing large's warm-start advantage break Phase 2 router collapse?

model:
  compute:
    flops_penalty_alpha: 1e-3
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  hf_num_workers: 4
  hf_prefetch_factor: 1
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 6000
  freeze_experts: false
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      small: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_small_final20k_constant_lr_s67-kivdz4qu:best"
      # large: intentionally omitted — starts from random init

validation:
  every_n_steps: 500
  snr_bins: 5
