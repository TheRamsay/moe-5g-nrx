# @package _global_
# Experiment 25: MoE alpha sweep — α=1e-3 (anchor re-baseline at 50k subset)
#
# Re-runs the asym-warm anchor (3witw8yw) at the current 50k subset standard
# so all 4 alpha-sweep points are trained on identical data pipeline. The
# original 3witw8yw streamed full HF — not directly comparable to exp24/26/27.
#
# Identical to exp23 except: 12k steps from scratch (not resumed), explicit
# 50k subset via RUN_ARGS overrides.

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: moe-alpha-sweep-v1
  exp_name: moe_alphasweep_asym_a1e3_s67
  tags: [moe, alpha-sweep, asymmetric-warmstart, anchor-rebaseline, hf, simo-1x4, 16qam, nl-range]
  notes: >
    Alpha sweep point 2/4. α=1e-3 anchor re-baselined on the 50k subset for
    pipeline-consistent comparison with exp24 (5e-4), exp26 (2e-3), exp27 (5e-3).
  study_slug: 2026-04-25-moe-alpha-sweep-v1
  study_path: experiments/2026-04-25-moe-alpha-sweep-v1
  question: How does the BLER vs FLOPs operating point shift with the FLOPs penalty α?

model:
  compute:
    flops_penalty_alpha: 1e-3
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 12000
  freeze_experts: false
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      small: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_small_final20k_constant_lr_s67-kivdz4qu:best"

validation:
  every_n_steps: 500
  snr_bins: 5
