# @package _global_
# Experiment 04: MoE with Soft Routing (High Temperature)
# Softer, more probabilistic routing

defaults:
  - override /model: moe

model:
  router:
    temperature: 2.0

training:
  max_steps: 10000
  batch_size: 32
  learning_rate: 0.001

logging:
  use_wandb: true

# Tags for wandb
tags: [moe, soft_routing, high_temp]
