# @package _global_
# Experiment 40: exp26 recipe at 100k training samples (vs 50k headline).
# Tests whether 50k limited the result. Identical to exp26 otherwise.

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: data-scaling-100k-v1
  exp_name: moe_a2e3_100k_s67
  tags: [moe, data-scaling, asymmetric-warmstart, hf, simo-1x4, 16qam, nl-range]
  notes: >
    exp26 recipe (alpha=2e-3, asym warm-start, seed 67) trained on 100k
    samples instead of 50k. Tests the data-scaling concern raised in
    consultation. Same loss / hyperparameters / architecture as exp26.
  study_slug: 2026-04-30-data-scaling-100k-v1
  study_path: experiments/2026-04-30-data-scaling-100k-v1
  question: Does training on 100k samples (vs 50k) improve BLER for the exp26 recipe?

model:
  compute:
    flops_penalty_alpha: 2e-3
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 12000
  seed: 67
  freeze_experts: false
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      small: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_small_final20k_constant_lr_s67-kivdz4qu:best"

validation:
  every_n_steps: 500
  snr_bins: 5
