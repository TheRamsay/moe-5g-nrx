# @package _global_
# Experiment 56: SYMMETRIC asym warm-start — COLD-small variant.
#
# Tests the hypothesis from routing-trajectory analysis:
#   "Router collapse attractor = expert(s) with largest initial quality lead."
#
# Existing exp26 (cold-LARGE) → router uses warm nano+small until large catches up
# This run (cold-SMALL) → predicts router uses warm nano+large until small catches up.
#
# Setup: warm nano + warm large; small starts random.
# Quality at step 0: warm large (0.87) > warm nano (0.97) > cold small (~0.99 random)
#
# Predictions:
#   - Router will prefer warm experts (large + nano) early
#   - May collapse to large (since it's warm AND highest capacity)
#   - May settle into nano/large split (cheap + best, skipping small entirely)
#   - Either way, small should be UNDER-used (the cold expert)
#
# If small DOES end up active by end of training → confirms the
# "delayed-emergence" mechanism (cold expert catches up).
# If small stays at 0% → suggests the asym warm-start works specifically because
# of large's massive capacity advantage, not the general "cold-expert-grows-in" idea.

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: asym-warm-symmetric-sweep-v1
  exp_name: asym_coldsmall_a2e3_s67
  tags: [moe, asym-warm-symmetric, cold-small, alpha-sweep, hf, simo-1x4, 16qam, nl-range]
  notes: >
    Symmetric counterpart to exp26 — instead of cold-large, we run cold-small
    with warm nano + warm large. Tests whether the asym-warm principle
    generalizes (cold expert grows in over training) or is specific to large.
  study_slug: 2026-04-30-asym-warm-symmetric-sweep-v1
  study_path: experiments/2026-04-30-asym-warm-symmetric-sweep-v1
  question: Does the asym-warm principle generalize to cold-small (not just cold-large)?

model:
  compute:
    flops_penalty_alpha: 2e-3
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 12000
  seed: 67
  freeze_experts: false
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      large: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
      # small: omitted → random init (the "cold" expert)

validation:
  every_n_steps: 500
  snr_bins: 5
