# @package _global_
# Experiment 10: Dense Stem Bottleneck - state_dim=16
# Large backbone kept fixed; only stem width and state_dim are reduced.
# Aggressive stem reduction to find where quality breaks.

defaults:
  - override /model: static_dense
  - override /dataset: mixed

experiment:
  batch_name: dense-stem-bottleneck-v1
  exp_name: dense_stem_s16_b8_h64_lr1e3_s67
  tags: [baseline, dense, capacity, synthetic, simo-1x4, 16qam, stem-bottleneck]
  notes: "Stem bottleneck study: state_dim=16, stem=[16,16]. Large backbone (block_hidden_dim=64) kept fixed to isolate stem."
  study_slug: 2026-04-06-dense-stem-bottleneck-v1
  study_path: experiments/2026-04-06-dense-stem-bottleneck-v1
  question: Is the stem the bottleneck? Does reducing state_dim hurt quality significantly?

model:
  backbone:
    stem_hidden_dims: [16, 16]
    state_dim: 16
    num_cnn_blocks: 8
    block_hidden_dim: 64
    readout_hidden_dim: 128

training:
  max_steps: 10000
