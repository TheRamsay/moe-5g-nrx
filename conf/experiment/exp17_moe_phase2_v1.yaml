# @package _global_
# Experiment 17: MoE Phase 2 — warm-start + staged training
#
# Stage 2B (steps 0-2000):  experts frozen, router + stem only
# Stage 2C (steps 2001-12000): all unfrozen, joint fine-tune
#
# Warm-start: stem from large dense checkpoint, each expert from its
# matching dense checkpoint (nano/small/large, all s56, 20k steps).

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: moe-phase2-v1
  exp_name: moe_phase2_v1_a1e3_b0p1_s67
  tags: [moe, phase2, warm-start, staged, compute-aware, hf, simo-1x4, 16qam, nl-range]
  notes: >
    Phase 2 staged training: 2k steps router warmup (experts frozen) then 10k
    joint fine-tune. Experts warm-started from finalized dense checkpoints.
    alpha=1e-3, beta=0.1 (inherited from Phase 1).
  study_slug: 2026-04-11-moe-phase2-v1
  study_path: experiments/2026-04-11-moe-phase2-v1
  question: Does warm-started staged training Pareto-dominate Phase 1 joint-from-scratch on BLER vs FLOPs?

model:
  compute:
    flops_penalty_alpha: 1e-3
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  hf_num_workers: 6
  hf_prefetch_factor: 1
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 12000
  freeze_experts: true
  unfreeze_experts_at_step: 2000
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      small: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_small_final20k_constant_lr_s67-kivdz4qu:best"
      large: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"

validation:
  every_n_steps: 500
  snr_bins: 5
