# @package _global_
# Experiment 05: MoE with High Compute Penalty
# Aggressive compute reduction - favor tiny/medium experts

defaults:
  - override /model: moe

model:
  compute:
    flops_penalty_alpha: 0.001

training:
  max_steps: 10000
  batch_size: 32
  learning_rate: 0.001

logging:
  use_wandb: true

# Tags for wandb
tags: [moe, high_penalty, compute_aware]
