# @package _global_
# Experiment 24: MoE alpha sweep — α=5e-4 (low FLOPs penalty)
#
# Part of the asym-warm alpha sweep that turns the 3-point Pareto into a real
# curve. Identical to exp23 except: 12k steps from scratch (not resumed),
# alpha varies. bs=128 to compose with the existing 12k anchor row.
#
# Asymmetric warm-start: stem + nano + small warm, large random init.
# Pinned for clean comparability across the 4 sweep points (exp24-exp27).

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: moe-alpha-sweep-v1
  exp_name: moe_alphasweep_asym_a5e4_s67
  tags: [moe, alpha-sweep, asymmetric-warmstart, hf, simo-1x4, 16qam, nl-range]
  notes: >
    Alpha sweep point 1/4. α=5e-4 (half of anchor). Expect higher FLOPs ratio
    than the α=1e-3 anchor — gives the upper end of the Pareto curve.
  study_slug: 2026-04-25-moe-alpha-sweep-v1
  study_path: experiments/2026-04-25-moe-alpha-sweep-v1
  question: How does the BLER vs FLOPs operating point shift with the FLOPs penalty α?

model:
  compute:
    flops_penalty_alpha: 5e-4
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 12000
  freeze_experts: false
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      small: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_small_final20k_constant_lr_s67-kivdz4qu:best"
      # large: intentionally omitted — random init

validation:
  every_n_steps: 500
  snr_bins: 5
