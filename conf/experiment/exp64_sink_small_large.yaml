# @package _global_
# Experiment 64: {sink, small, large} — synthesis architecture.
#
# Replaces exp26's nano (320M total FLOPs, 0% decode success) with sink
# (0M, true zero-cost skip). Keeps small as the middle-tier decoder
# (because exp61 v2 showed channel_only doesn't fill that role).
#
# Predicted outcome:
#   - BLER ≈ exp26 (~0.902)
#   - FLOPs ≤ exp26 (~0.56), saving ~5-7% from sink-vs-nano substitution
#   - Cleaner final architecture: "tri-level cascade with explicit skip"
#
# Recipe: same as exp26 — α=2e-3, asym warm-start, seed 67, 12k steps.

defaults:
  - override /model: moe_sink_small_large
  - override /dataset: mixed

experiment:
  batch_name: synthesis-sink-small-large-v1
  exp_name: moe_sink_small_large_a2e3_s67
  tags: [moe, function-specialized, sink-expert, asym-warm, hf, simo-1x4, 16qam, synthesis]
  notes: >
    Synthesis of per-expert success-rate finding (nano/small never decode)
    and exp61 v2 finding (channel_only doesn't fill the middle compute-tier
    role): replace nano with sink, keep small as productive middle tier.
  study_slug: 2026-05-01-synthesis-sink-small-large-v1
  study_path: experiments/2026-05-01-synthesis-sink-small-large-v1
  question: Does {sink, small, large} match exp26's BLER at lower FLOPs?

model:
  compute:
    flops_penalty_alpha: 2e-3
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 12000
  seed: 67
  freeze_experts: false
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      # sink: no warm-start (no params)
      small: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_small_final20k_constant_lr_s67-kivdz4qu:best"
      # large: random init (asym warm)

validation:
  every_n_steps: 500
  snr_bins: 5
