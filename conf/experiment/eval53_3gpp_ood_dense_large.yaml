# @package _global_
# Eval53: dense_large on 3GPP in-family OOD profiles. Companion to eval52.

defaults:
  - override /model: static_dense
  - override /dataset: mixed

experiment:
  batch_name: 3gpp-ood-eval-v1
  exp_name: eval_dense_large_3gpp_ood
  tags: [eval, ood, 3gpp, in-family, dense, baseline, simo-1x4, 16qam]
  notes: dense_large baseline on TDL-A + TDL-D + CDL-A. Reference for exp26.
  study_slug: 2026-04-30-3gpp-ood-eval-v1
  study_path: experiments/2026-04-30-3gpp-ood-test-v1
  question: Does dense_large generalize to 3GPP channel models it wasn't trained on?

model:
  backbone:
    stem_hidden_dims: [64, 64]
    num_cnn_blocks: 8
    block_hidden_dim: 64
    readout_hidden_dim: 128

evaluation:
  profiles: [tdla, tdld, cdla]
  snr_bins: 7
  use_artifacts: false
