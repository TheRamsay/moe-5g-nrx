# @package _global_
# Experiment 21: MoE Phase 2 — soft capacity constraint
#
# Phase 2 v1 (beta=0.1) showed full router collapse (large=100%).
# This run replaces the MSE load balance loss with a soft capacity penalty:
# penalise any expert exceeding capacity_factor/n_experts of the batch.
# capacity_factor=1.5 → max 50% per expert (vs 100% collapse).
#
# load_balance_beta=0.0 to isolate the capacity mechanism cleanly.

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: moe-phase2-beta-sweep-v1
  exp_name: moe_phase2_cap1p5_w0p5_s67
  tags: [moe, phase2, warm-start, staged, compute-aware, hf, simo-1x4, 16qam, nl-range, capacity]
  notes: >
    Phase 2 with soft capacity constraint: penalise any expert exceeding 50%
    of the batch (capacity_factor=1.5, capacity_weight=0.5). load_balance_beta=0
    to isolate capacity mechanism. Compare against beta sweep runs.
  study_slug: 2026-04-11-moe-phase2-beta-sweep-v1
  study_path: experiments/2026-04-11-moe-phase2-beta-sweep-v1
  question: Does a soft capacity constraint prevent router collapse better than MSE load balance?

model:
  compute:
    flops_penalty_alpha: 1e-3
    load_balance_beta: 0.0
    capacity_weight: 0.5
    capacity_factor: 1.5

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  hf_num_workers: 4
  hf_prefetch_factor: 1
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 6000
  freeze_experts: true
  unfreeze_experts_at_step: 2000
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      small: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_small_final20k_constant_lr_s67-kivdz4qu:best"
      large: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"

validation:
  every_n_steps: 500
  snr_bins: 5
