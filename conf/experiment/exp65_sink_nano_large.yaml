# @package _global_
# Experiment 65: bold simplification — {sink, nano, large}.
#
# Hypothesis test: nano can serve BOTH the "hopeless" and "borderline" regimes
# that exp26 used nano AND small for. The middle-expert investigation
# (2026-05-01) showed nano gets BER 0.237 on small's routed samples — virtually
# identical to small's 0.230. If routing dynamics can train nano to operate in
# both regimes (hard → random output, borderline → partial decode), this is the
# optimal final architecture.
#
# Predicted outcomes:
#   - WIN: BLER ≈ exp26 (~0.902) at MUCH lower FLOPs (~40% vs exp26's 56%).
#     Best architecture for the report.
#   - LOSE: BLER hit similar to exp41 (~+5pp, drop-small). Confirms 3 compute
#     tiers required for routing dynamics. exp64 stays the best simplification.

defaults:
  - override /model: moe_sink_nano_large
  - override /dataset: mixed

experiment:
  batch_name: bold-simplification-sink-nano-large-v1
  exp_name: moe_sink_nano_large_a2e3_s67
  tags: [moe, function-specialized, sink-expert, asym-warm, hf, simo-1x4, 16qam, bold-simplification]
  notes: >
    Bold 2-decoder simplification: sink + nano + large. Tests whether nano can
    serve both regimes (hopeless + borderline) that exp26 split between nano
    and small. Middle-expert investigation (2026-05-01) showed nano's BER on
    small's routed samples is virtually identical to small's — suggesting
    nano alone may suffice if router can learn the dual regime.
  study_slug: 2026-05-01-bold-simplification-sink-nano-large-v1
  study_path: experiments/2026-05-01-bold-simplification-sink-nano-large-v1
  question: Can nano serve both hopeless + borderline regimes alone?

model:
  compute:
    flops_penalty_alpha: 2e-3
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 12000
  seed: 67
  freeze_experts: false
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      # sink: no warm-start (no params)
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      # large: random init (asym warm)

validation:
  every_n_steps: 500
  snr_bins: 5
