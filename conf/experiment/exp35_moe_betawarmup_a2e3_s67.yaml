# @package _global_
# Experiment 35: β-warmup stabilization recipe — seed=67
#
# Alternative to large-warmup (which over-corrected to 100% large collapse).
# Uses load-balance pressure instead of freezing: β=0.5 for first 4k steps
# (strong push toward 33/33/33 routing) then drops to β=0.1 (steady-state,
# matches exp26 anchor). Hypothesis: heavy load-balance early prevents both
# directions of collapse (large→0 and large→100%) by forcing all 3 experts
# active during the random-init phase, then steady-state β allows the router
# to specialize once large has caught up.
#
# Same recipe as exp26 + β warmup. 3 seeds (s67, s32, s42) test seed stability.

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: moe-betawarmup-v1
  exp_name: moe_betawarmup_a2e3_s67
  tags: [moe, asym-warm, beta-warmup, stabilization, hf, simo-1x4, 16qam, nl-range]
  notes: >
    β-warmup stabilization: β=0.5 for first 4k steps, then β=0.1. Tests an
    alternative to the failed large-warmup (which over-corrected to 100% large).
    seed=67.
  study_slug: 2026-04-26-moe-betawarmup-v1
  study_path: experiments/2026-04-26-moe-betawarmup-v1
  question: Does β-warmup stabilize the asym-warm recipe across seeds without over-correcting?

runtime:
  seed: 67

model:
  compute:
    flops_penalty_alpha: 2e-3
    load_balance_beta: 0.1
    load_balance_beta_warmup_steps: 4000
    load_balance_beta_warmup_value: 0.5

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 12000
  freeze_experts: false
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      small: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_small_final20k_constant_lr_s67-kivdz4qu:best"

validation:
  every_n_steps: 500
  snr_bins: 5
