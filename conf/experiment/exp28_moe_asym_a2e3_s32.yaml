# @package _global_
# Experiment 28: 3-seed confirmation of alpha-sweep winner — seed=32
#
# Clone of exp26 (α=2e-3, bs=128, 12k steps, asym warm-start) with seed=32.
# Together with exp26 (s67) and exp29 (s42), gives mean ± std on the headline
# Pareto point.

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: moe-asym-a2e3-3seed-v1
  exp_name: moe_asym_a2e3_s32
  tags: [moe, asym-warm, multi-seed, hf, simo-1x4, 16qam, nl-range]
  notes: >
    Multi-seed confirmation of alpha-sweep winner (exp26, α=2e-3). seed=32.
    Identical recipe to exp26 except seed.
  study_slug: 2026-04-25-moe-asym-a2e3-3seed-v1
  study_path: experiments/2026-04-25-moe-asym-a2e3-3seed-v1
  question: Does the α=2e-3 result hold across seeds, or is it lucky-init?

runtime:
  seed: 32

model:
  compute:
    flops_penalty_alpha: 2e-3
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 12000
  freeze_experts: false
  warm_start:
    stem_checkpoint: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_large_final20k_constant_lr_s67-55l1dpby:best"
    experts:
      nano: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_nano_final20k_constant_lr_s67-aos4hhid:best"
      small: "knn_moe-5g-nrx/moe-5g-nrx/model-dense_small_final20k_constant_lr_s67-kivdz4qu:best"

validation:
  every_n_steps: 500
  snr_bins: 5
