# @package _global_
# Experiment 18: MoE Phase 1 (s56) — joint from scratch, HF training
#
# Re-run of Phase 1 with state_dim=56 (moe_nl.yaml updated after waterfall study
# showed state_dim=32 costs 15pp BLER in the waterfall region).
# Uses HF dataset for fast, reliable training.
#
# This is the clean Phase 1 baseline: no warm-start, no staged training.
# Compare against exp17 (Phase 2) to isolate the value of warm-start + staging.

defaults:
  - override /model: moe_nl
  - override /dataset: mixed

experiment:
  batch_name: moe-phase1-s56-v1
  exp_name: moe_phase1_s56_a1e3_b0p1_s67
  tags: [moe, phase1, joint, compute-aware, hf, simo-1x4, 16qam, nl-range, s56]
  notes: >
    Phase 1 MoE (joint from scratch) with state_dim=56 stem. Corrects the s32
    stem used in the original Phase 1 run (exp12), which cost ~15pp BLER in the
    waterfall region. Uses HF dataset for training throughput.
    alpha=1e-3, beta=0.1 (inherited from Phase 1 sweep winner).
  study_slug: 2026-04-11-moe-phase1-s56-v1
  study_path: experiments/2026-04-11-moe-phase1-s56-v1

model:
  compute:
    flops_penalty_alpha: 1e-3
    load_balance_beta: 0.1

training:
  hf_dataset: Vack0/moe-5g-nrx
  batch_size: 128
  hf_num_workers: 6
  hf_prefetch_factor: 1
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_steps: 10000

validation:
  every_n_steps: 500
  snr_bins: 5
