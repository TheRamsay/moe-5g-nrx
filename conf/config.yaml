defaults:
    - model: static_dense
    - wandb: default
    - override hydra/job_logging: disabled
    - override hydra/hydra_logging: disabled
    - _self_

project:
    name: moe-5g-nrx
    task: llr_softbit_decoding

runtime:
    seed: 67
    device: cpu

data:
    input_channels: 16
    num_rx_antennas: 4
    channel_estimator: ls

training:
    batch_size: 32
    learning_rate: 0.001
    max_steps: 10000

experiment:
    batch_name: null  # Set via env var BATCH_NAME or override
    exp_name: null    # Set via env var EXP_NAME or override
    tags: []          # Additional tags for this experiment
    notes: null       # Description/notes for this experiment

logging:
    use_wandb: true
    log_every_n_steps: 50

hydra:
    output_subdir: null
    run:
        dir: .
