defaults:
    - model: static_dense
    - wandb: default
    - _self_
    - dataset: tdlc
    - optional experiment: null
    - override hydra/job_logging: disabled
    - override hydra/hydra_logging: disabled

project:
    name: moe-5g-nrx
    task: llr_softbit_decoding

runtime:
    seed: 67
    device: cpu

data:
    input_channels: 16
    num_rx_antennas: 4
    channel_estimator: ls
    num_subcarriers: 128
    num_ofdm_symbols: 14
    bits_per_symbol: 4

training:
    hf_dataset: null        # e.g. "Vack0/moe-5g-nrx" — use HuggingFace dataset instead of on-the-fly Sionna
    hf_num_workers: 2       # per profile; 2×2=4 total for mixed — fits in 24GB RAM with CoW pre-load
    hf_prefetch_factor: 2   # 2 batches queued per worker
    hf_max_samples: null    # cap training samples per profile; null = use full dataset
    hf_train_data_dir: null # local Arrow dir for training; if set, overrides hf_dataset reads (expects {dir}/{profile}/)
    mixed_precision: null   # bf16 recommended on L40S/A100; fp16 needs GradScaler; null = fp32
    torch_compile: false    # torch.compile(model, mode=reduce-overhead); adds ~30-60s warmup, then faster
    batch_size: 512
    learning_rate: 0.001
    weight_decay: 0.0001
    scheduler:
        name: none
        min_lr: 0.0
    gradient_clip_norm: 1.0
    max_steps: 10000
    resume_from: null      # local path or W&B artifact ref to resume training from
    overfit_single_batch: false
    overfit_stop_loss: 0.01
    overfit_min_steps: 100
    checkpoint_dir: checkpoints
    checkpoint:
        every_n_steps: 500
        save_latest: true
        save_best: true
        best_metric: ber
        best_metric_mode: min
        best_metric_aggregation: mean
        best_profiles: ${validation.profiles}

validation:
    enabled: true
    dataset_path: null
    data_dir: data/val
    hf_dataset: null      # e.g. "Vack0/moe-5g-nrx" — loads from HuggingFace instead of .pt files
    hf_split: val
    profiles: [uma, tdlc]
    batch_size: 64
    every_n_steps: 500
    max_samples: null
    snr_bins: 5

evaluation:
    checkpoint: checkpoints/static_dense_nrx.pt
    checkpoint_artifact: null
    dataset_path: null
    batch_size: 64
    max_samples: null
    all_profiles: false
    profiles: [uma, tdlc]
    snr_bins: 7
    device: ${runtime.device}
    data_dir: data/test
    log_to_wandb: true
    use_artifacts: true
    dataset_artifact_alias: latest
    failure_examples_limit: 20

experiment:
    batch_name: null
    exp_name: null
    tags: []
    notes: null
    study_slug: null
    study_path: null
    question: null

generation:
    output_dir: data
    num_samples: 32768
    batch_size: 64
    split: both          # val | test | both
    profiles: [uma, tdlc]
    include_mixed: false
    base_seed: 67
    log_to_wandb: true
    artifact_aliases: [latest]
    deepmimo:
        scenario: null
        dataset_folder: ./data/deepmimov3/
        active_users_only: true
        active_bs: [1]
        user_rows: null
        user_subsampling: 1.0
        num_paths: 10
        use_all_rows_if_unspecified: true
        snr_db_min: ${dataset.snr_db.min}
        snr_db_max: ${dataset.snr_db.max}
        estimation_noise_std: ${dataset.estimation_noise_std}

reporting:
    create_wandb_report: true
    title: Dense Baseline Study
    description: Dense baseline and capacity comparison across validation and evaluation runs.
    slug: dense-baseline-study
    train_groups: [dense-baseline-v1, dense-capacity-v1]
    eval_groups: [dense-baseline-v1, dense-capacity-v1]
    eval_job_type: evaluation
    train_job_type: train

logging:
    use_wandb: true
    log_every_n_steps: 50
    train_metrics_ema_alpha: 0.1
    train_metrics_window_size: 50

hydra:
    output_subdir: null
    run:
        dir: .
