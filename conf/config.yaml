defaults:
    - model: static_dense
    - wandb: default
    - _self_
    - dataset: tdlc
    - optional experiment: null
    - override hydra/job_logging: disabled
    - override hydra/hydra_logging: disabled

project:
    name: moe-5g-nrx
    task: llr_softbit_decoding

runtime:
    seed: 67
    device: cpu

data:
    input_channels: 16
    num_rx_antennas: 4
    channel_estimator: ls
    num_subcarriers: 128
    num_ofdm_symbols: 14
    bits_per_symbol: 4
    train_samples: 65536
    snr_db_range: [0.0, 24.0]
    channel_estimator_noise_std: 0.15
    channel_variation: 0.25

training:
    batch_size: 32
    learning_rate: 0.001
    weight_decay: 0.0001
    gradient_clip_norm: 1.0
    num_workers: 0
    max_steps: 10000
    checkpoint_dir: checkpoints

validation:
    enabled: true
    dataset_path: data/val/mixed.pt
    batch_size: 64
    every_n_steps: 500
    max_samples: null

evaluation:
    checkpoint: checkpoints/static_dense_nrx.pt
    dataset_path: data/test/mixed.pt
    batch_size: 64
    max_samples: null
    all_profiles: false
    profiles: [uma, tdlc]
    snr_bins: null
    device: ${runtime.device}
    data_dir: data/test
    log_to_wandb: true

experiment:
    batch_name: null
    exp_name: null
    tags: []
    notes: null

generation:
    output_dir: data
    num_samples: 32768
    batch_size: 64
    split: both          # val | test | both
    profiles: [tdlc, uma]
    include_mixed: true
    base_seed: 67

logging:
    use_wandb: true
    log_every_n_steps: 50

hydra:
    output_subdir: null
    run:
        dir: .
