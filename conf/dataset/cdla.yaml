# CDL-A Channel Profile: 3GPP Clustered-Delay-Line, NLOS with spatial structure.
# Used for OOD-style "in-family" generalization testing — model trained on
# UMa+TDL-C, tested on CDL-A which adds clustered spatial scattering vs TDL.
defaults:
  - base

name: cdla
channel_profile: cdla
snr_db:
  min: -10.0
  max: 20.0
delay_spread_s: 1.0e-7  # 100 ns — typical CDL-A profile spread
min_speed_mps: 0.0
max_speed_mps: 25.0
