# TDL-D Channel Profile: 3GPP Tapped-Delay-Line with Rician fading
# (LOS-dominant). Used for OOD-style "in-family" generalization testing —
# model trained on UMa+TDL-C (NLOS), tested on TDL-D (LOS-dominant).
defaults:
  - base

name: tdld
channel_profile: tdld
snr_db:
  min: -10.0
  max: 20.0
delay_spread_s: 3.0e-8  # 30 ns — typical TDL-D spread
min_speed_mps: 0.0
max_speed_mps: 25.0
