# Shared across all synthetic channel profiles (AWGN, UMa, TDL-C).
# Channel-specific parameters are overridden per-profile in dedicated YAML files.

name: base_defaults

num_subcarriers: 256        # Frequency domain: 256 subcarriers
num_ofdm_symbols: 14        # Time domain: 14 OFDM symbols per slot

modulation: qam16
carrier_frequency_hz: 3500000000.0
subcarrier_spacing_hz: 15000.0

estimation_noise_std: 0.05  # LS estimate error std dev: scales noise in estimates

pilot_spacing_freq: 6       # Reference signals every 6 subcarriers (freq domain)
pilot_spacing_time: 4       # Reference signals every 4 OFDM symbols (time domain)

loader:
  num_workers: 0
  pin_memory: false         # Pin PyTorch tensors to GPU memory (faster transfers)
  prefetch_factor: 2        # Batches to prefetch per worker (if num_workers > 0)
  persistent_workers: false # Keep workers alive between epochs

max_batches_per_epoch: 100

diagnostics:
  sample_preview: true
