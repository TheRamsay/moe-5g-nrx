# Shared across all supported synthetic channel profiles (UMa, TDL-C, mixed).
# Channel-specific parameters are overridden per-profile in dedicated YAML files.

name: base_defaults

num_subcarriers: ${data.num_subcarriers}
num_ofdm_symbols: ${data.num_ofdm_symbols}

modulation: qam16
carrier_frequency_hz: 3500000000.0
subcarrier_spacing_hz: 15000.0

estimation_noise_std: 0.05  # LS estimate error std dev: scales noise in estimates

pilot_spacing_freq: ${model.backbone.pilot_subcarrier_spacing}
pilot_spacing_time: ${model.backbone.pilot_symbol_indices}

loader:
  num_workers: 0
  pin_memory: false         # Pin host memory for faster transfer to GPU
  prefetch_factor: 2        # Batches to prefetch per worker (if num_workers > 0)
  persistent_workers: true  # Keep workers alive between epochs

max_batches_per_epoch: 100

diagnostics:
  sample_preview: true
